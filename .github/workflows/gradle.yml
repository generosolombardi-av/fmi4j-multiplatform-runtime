name: Build

on:
  push:
  pull_request:

jobs:
  assemble:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        java-version: [ 17, 21 ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: gradle

      - name: Assemble JVM artifacts
        run: ./gradlew clean :fmi-md:assemble :fmi-import:assemble :test-fmus:assemble -PskipBuildNative=true
        shell: bash
